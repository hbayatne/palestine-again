# Mario Land Video Bot — Edit these settings to customize your highlight reel

# Folders
input_dir: mario_land          # Drop your video clips here
output_dir: output             # Final video appears here
output_filename: mario_land_highlights.mp4

# How much of each clip to use
highlight_seconds_per_clip: 12   # seconds per clip in the final video
highlight_mode: best             # best = takes middle-third (usually the action)
                                 # start = takes from beginning
                                 # middle = takes from exact center

# Storyboard title cards shown before each scene
title_card_duration: 2.5        # seconds each scene title card shows

# Intro & outro
intro_duration: 4.0
outro_duration: 3.0
trip_title: "Mario Land"
trip_subtitle: "Family Trip Highlights"

# Crossfade between clips
transition_seconds: 0.6

# Background music (optional)
# background_music: music/soundtrack.mp3   # uncomment and set path
background_music: null
music_volume: 0.25              # 0.0 (silent) → 1.0 (full volume)

# Output quality
output_width: 1920
output_height: 1080
fps: 30
render_quality: medium          # ultrafast | fast | medium | slow | veryslow
crf: 23                         # 18 = best quality | 28 = smallest file
